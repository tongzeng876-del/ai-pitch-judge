<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Pitch Judge | Ward Infinity</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-datalabels/2.2.0/chartjs-plugin-datalabels.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { background-color: #050505; color: #e5e5e5; font-family: sans-serif; }
        .glass { background: rgba(30,30,30,0.6); border: 1px solid #333; backdrop-filter: blur(10px); }
        .step-active { border-color: #3b82f6; box-shadow: 0 0 15px rgba(59,130,246,0.3); }
        .step-done { border-color: #10b981; opacity: 0.6; }
    </style>
</head>
<body class="py-6 px-4 flex flex-col items-center min-h-screen">

    <div class="w-full max-w-5xl mb-6 flex justify-between items-end border-b border-gray-800 pb-4">
        <div>
            <h1 class="text-2xl font-bold text-white tracking-wider">WARD INFINITY AI JUDGE</h1>
            <p class="text-gray-500 text-xs mt-1">Full Rubric Integration (Scale 1-7)</p>
        </div>
        <div class="flex gap-2">
            <button id="btnNew" class="hidden px-3 py-1 rounded bg-gray-700 hover:bg-gray-600 text-white text-xs font-bold border border-gray-500 transition-colors">
                ↻ NEW EVALUATION
            </button>
            <div id="statusBadge" class="px-3 py-1 rounded-full bg-gray-800 text-gray-400 text-xs font-mono">SYSTEM READY</div>
        </div>
    </div>

    <div class="w-full max-w-5xl grid grid-cols-1 md:grid-cols-3 gap-3 mb-6">
        <div id="s1" class="glass p-4 rounded-xl flex flex-col items-center justify-center transition-all step-active">
            <span class="text-[10px] text-blue-400 font-bold mb-1">STEP 1</span>
            <input type="file" id="pdfIn" accept="application/pdf" class="hidden">
            <button onclick="document.getElementById('pdfIn').click()" class="bg-gray-800 hover:bg-gray-700 px-3 py-1.5 rounded text-xs font-bold text-white border border-gray-600">UPLOAD DECK</button>
            <span id="pdfName" class="text-[10px] text-gray-500 mt-2 truncate max-w-[120px]"></span>
        </div>
        <div id="s2" class="glass p-4 rounded-xl flex flex-col items-center justify-center opacity-50 transition-all">
            <span class="text-[10px] text-gray-500 font-bold mb-1">STEP 2</span>
            <button id="btnP" class="bg-indigo-900 text-indigo-200 px-3 py-1.5 rounded text-xs font-bold w-28" disabled>REC PITCH</button>
            <span id="timeP" class="text-[10px] text-gray-500 mt-1 font-mono">00:00</span>
        </div>
        <div id="s3" class="glass p-4 rounded-xl flex flex-col items-center justify-center opacity-50 transition-all">
            <span class="text-[10px] text-gray-500 font-bold mb-1">STEP 3</span>
            <button id="btnSub" class="bg-green-700 hover:bg-green-600 text-white px-5 py-1.5 rounded text-xs font-bold shadow-lg" disabled>ANALYZE</button>
        </div>
    </div>

    <div id="printArea" class="w-full max-w-5xl bg-[#050505] p-6 rounded-2xl hidden">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            
            <div id="report-visuals" class="lg:col-span-12 grid grid-cols-1 lg:grid-cols-12 gap-6 bg-[#050505] p-2 items-stretch">
                
                <div class="lg:col-span-7 glass rounded-2xl p-6 flex flex-col items-center justify-center">
                    <div class="w-full flex justify-between items-center mb-2 absolute top-6 left-6 pr-12">
                        <h3 class="text-sm font-bold text-white">RUBRIC RADAR</h3>
                        <div class="flex gap-3 text-[10px] font-bold">
                            <span class="text-indigo-400">● PITCH PERFORMANCE</span>
                        </div>
                    </div>
                    <div class="relative h-72 w-full max-w-md mx-auto mt-6">
                        <canvas id="radarChart"></canvas>
                    </div>
                </div>

                <div class="lg:col-span-5 flex flex-col justify-center h-full">
                    <div class="glass p-8 rounded-xl border-l-4 border-indigo-500 flex flex-col items-center justify-center h-full relative overflow-hidden shadow-2xl shadow-indigo-900/20">
                        
                        <div id="scoreGlow" class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-32 h-32 bg-indigo-600/20 blur-[60px] rounded-full pointer-events-none"></div>

                        <div class="relative z-10 text-center w-full">
                            <div class="text-xs text-indigo-300 font-bold uppercase tracking-[0.2em] mb-2">Overall Score</div>
                            <div id="valP" class="text-8xl font-black text-transparent bg-clip-text bg-gradient-to-br from-white via-indigo-100 to-indigo-500 leading-none drop-shadow-lg pb-2">0.0</div>
                            <div class="text-sm text-gray-500 mt-8 font-mono border-t border-gray-800 pt-3 inline-block px-4">OUT OF 7.0</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-12 grid grid-cols-1 lg:grid-cols-2 gap-6">
                <div class="glass p-6 rounded-xl border border-gray-800">
                    <h4 class="text-sm font-bold text-green-400 mb-4 uppercase flex items-center gap-2 border-b border-gray-800 pb-2">
                        <span>★</span> Key Strengths
                    </h4>
                    <ul id="listStr" class="text-sm text-gray-300 space-y-4 list-disc pl-4 leading-relaxed marker:text-green-600"></ul>
                    
                    <h4 class="text-sm font-bold text-yellow-400 mt-8 mb-4 uppercase flex items-center gap-2 border-b border-gray-800 pb-2">
                        <span>⚡</span> Recommended Improvements
                    </h4>
                    <ul id="listImp" class="text-sm text-gray-300 space-y-4 list-disc pl-4 leading-relaxed marker:text-yellow-600"></ul>
                </div>

                <div class="glass p-6 rounded-xl border-l-4 border-orange-600 bg-orange-900/5">
                    <h4 class="text-sm font-bold text-orange-400 mb-4 uppercase flex items-center gap-2 border-b border-orange-900/30 pb-2">
                        <span>⚠️</span> Potential Concerns
                    </h4>
                    <ul id="listRisk" class="text-sm text-gray-300 space-y-4 leading-relaxed"></ul>
                </div>
            </div>
        </div>
    </div>
    
    <button id="btnExp" class="mt-6 bg-gray-800 hover:bg-gray-700 text-white px-4 py-2 rounded text-xs font-bold transition-colors hidden flex items-center gap-2">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
        DOWNLOAD PROFESSIONAL REPORT (PDF)
    </button>

    <script>
        Chart.register(ChartDataLabels);

        let fPDF=null, bP=null;
        let currentData = null; 

        const els = {
            s1:document.getElementById('s1'), s2:document.getElementById('s2'), s3:document.getElementById('s3'),
            btnP:document.getElementById('btnP'), 
            btnSub:document.getElementById('btnSub'), stat:document.getElementById('statusBadge'),
            btnNew:document.getElementById('btnNew'), printArea:document.getElementById('printArea'),
            pdfName:document.getElementById('pdfName'), timeP:document.getElementById('timeP')
        };

        // --- 1. UPLOAD ---
        document.getElementById('pdfIn').onchange = e => {
            if(e.target.files[0]){
                fPDF = e.target.files[0];
                els.pdfName.innerText = fPDF.name;
                stepDone(els.s1); stepActive(els.s2);
                els.btnP.disabled = false;
            }
        };

        // --- 2. RECORDER ---
        const setupRec = (btn, timer, nextStepFn) => {
            let mr, chunks=[], start, tInt;
            btn.onclick = async () => {
                if(btn.innerText.includes('REC')) {
                    try {
                        const stream = await navigator.mediaDevices.getUserMedia({audio:true});
                        mr = new MediaRecorder(stream);
                        chunks=[];
                        mr.ondataavailable = e => chunks.push(e.data);
                        mr.onstop = () => nextStepFn(new Blob(chunks,{type:'audio/wav'}));
                        mr.start();
                        start = Date.now();
                        tInt = setInterval(() => {
                            const d = ((Date.now()-start)/1000)|0;
                            document.getElementById(timer).innerText = `00:${d<10?'0'+d:d}`;
                        },1000);
                        btn.innerText = 'STOP'; btn.classList.add('bg-red-600','text-white','animate-pulse');
                        btn.classList.remove('bg-indigo-900');
                    } catch(e) { alert("Mic Error: " + e); }
                } else {
                    mr.stop(); clearInterval(tInt);
                    btn.innerText = 'SAVED'; btn.classList.remove('bg-red-600','animate-pulse');
                    btn.disabled = true;
                }
            };
        };

        setupRec(els.btnP, 'timeP', b => { 
            bP=b; stepDone(els.s2); stepActive(els.s3); els.btnSub.disabled = false; 
        });

        // --- 3. SUBMIT ---
        els.btnSub.onclick = async () => {
            els.btnSub.innerText = 'ANALYZING...';
            els.stat.innerText = 'AI JUDGING...'; els.stat.classList.add('text-blue-400','animate-pulse');
            
            const fd = new FormData();
            fd.append('pdf_file', fPDF);
            fd.append('pitch_audio', bP, 'p.wav');

            try {
                const res = await fetch('http://127.0.0.1:8000/analyze_full_session', {method:'POST', body:fd});
                if (!res.ok) {
                    const errData = await res.json();
                    throw new Error(errData.detail || "Server Error");
                }

                const data = await res.json();
                currentData = data; 
                render(data);
                els.printArea.classList.remove('hidden');
                document.getElementById('btnExp').classList.remove('hidden');
                els.btnNew.classList.remove('hidden'); 
                els.btnSub.innerText = 'DONE';
                els.stat.innerText = 'COMPLETE'; els.stat.classList.remove('animate-pulse');
            } catch(e) { 
                alert("Analysis Failed: " + e.message); 
                els.btnSub.innerText = 'RETRY'; 
                els.stat.innerText = 'ERROR'; els.stat.classList.remove('animate-pulse');
            }
        };

        // --- 4. RESET ---
        els.btnNew.onclick = () => {
            fPDF=null; bP=null; currentData=null;
            stepActive(els.s1); 
            resetStep(els.s2); els.btnP.disabled=true; els.btnP.innerText="REC PITCH"; els.btnP.classList.add('bg-indigo-900');
            resetStep(els.s3); els.btnSub.disabled=true; els.btnSub.innerText="ANALYZE";
            els.pdfName.innerText = ""; els.timeP.innerText = "00:00";
            els.printArea.classList.add('hidden');
            document.getElementById('btnExp').classList.add('hidden');
            els.btnNew.classList.add('hidden');
            els.stat.innerText = "SYSTEM READY";
            document.getElementById('pdfIn').value = "";
        };

        // --- 5. PDF EXPORT ---
        document.getElementById('btnExp').onclick = async () => {
            const btn = document.getElementById('btnExp');
            const origText = btn.innerText;
            btn.innerText = "GENERATING PDF...";
            btn.disabled = true;

            const { jsPDF } = window.jspdf;
            const doc = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a4' });
            const pdfW = doc.internal.pageSize.getWidth();
            const pdfH = doc.internal.pageSize.getHeight();
            doc.setFillColor(5, 5, 5); 
            doc.rect(0, 0, pdfW, pdfH, 'F');

            const scoreEl = document.getElementById('valP');
            const glowEl = document.getElementById('scoreGlow');
            
            const originalClasses = scoreEl.className;
            
            // 截图前样式修复：纯白字，无光晕
            scoreEl.className = "text-8xl font-black text-white leading-none drop-shadow-lg pb-2"; 
            glowEl.classList.add('hidden'); 

            try {
                const visuals = document.getElementById('report-visuals');
                const canvas = await html2canvas(visuals, { scale: 2, backgroundColor: '#050505', useCORS: true });
                const imgData = canvas.toDataURL('image/png');
                const imgProps = doc.getImageProperties(imgData);
                const imgHeight = (imgProps.height * pdfW) / imgProps.width;
                doc.addImage(imgData, 'PNG', 0, 0, pdfW, imgHeight);

                let yPos = imgHeight + 10; 
                const margin = 15;
                const textWidth = pdfW - (margin * 2);
                
                doc.setFont("helvetica", "bold");
                doc.setFontSize(14);
                
                const addSection = (title, items, colorRGB) => {
                    if (yPos > pdfH - 20) { doc.addPage(); doc.setFillColor(5, 5, 5); doc.rect(0, 0, pdfW, pdfH, 'F'); yPos = 20; }
                    doc.setTextColor(...colorRGB);
                    doc.setFont("helvetica", "bold");
                    doc.text(title, margin, yPos);
                    yPos += 7;
                    doc.setTextColor(220, 220, 220); 
                    doc.setFont("helvetica", "normal");
                    doc.setFontSize(10); 

                    items.forEach(item => {
                        const cleanText = "• " + item.replace(/\*\*/g, ''); 
                        const splitText = doc.splitTextToSize(cleanText, textWidth);
                        if (yPos + (splitText.length * 5) > pdfH - 10) {
                            doc.addPage(); doc.setFillColor(5, 5, 5); doc.rect(0, 0, pdfW, pdfH, 'F'); yPos = 20;
                        }
                        doc.text(splitText, margin, yPos);
                        yPos += (splitText.length * 5) + 3; 
                    });
                    yPos += 8; 
                };

                if (currentData.feedback.strengths.length > 0) addSection("KEY STRENGTHS", currentData.feedback.strengths, [74, 222, 128]); 
                if (currentData.feedback.improvements.length > 0) addSection("RECOMMENDED IMPROVEMENTS", currentData.feedback.improvements, [250, 204, 21]); 
                if (currentData.potential_concerns.length > 0) {
                    const riskTexts = currentData.potential_concerns.map(r => `${r.title}: ${r.description}`);
                    addSection("POTENTIAL CONCERNS", riskTexts, [234, 88, 12]); 
                }

                doc.save('Ward_Infinity_Report.pdf');
            } finally {
                scoreEl.className = originalClasses;
                glowEl.classList.remove('hidden');
                btn.innerText = origText;
                btn.disabled = false;
            }
        };

        // --- HELPERS ---
        function stepActive(el) { el.classList.remove('opacity-50','step-done'); el.classList.add('step-active'); }
        function stepDone(el) { el.classList.remove('step-active'); el.classList.add('step-done'); }
        function resetStep(el) { el.classList.remove('step-active','step-done'); el.classList.add('opacity-50'); }

        let chart;
        const render = (d) => {
            const ctx = document.getElementById('radarChart').getContext('2d');
            const keys = ['problem', 'market', 'solution', 'biz_model', 'traction', 'impact'];
            const pData = keys.map(k => d.pitch_scores ? (d.pitch_scores[k] || 0) : 0);

            if(chart) chart.destroy();
            chart = new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: ['Problem', 'Market', 'Solution', 'Biz Model', 'Traction', 'Impact'],
                    datasets: [
                        { 
                            label: 'Pitch', 
                            data: pData, 
                            borderColor: '#6366f1', 
                            backgroundColor: 'rgba(99,102,241,0.2)', 
                            borderWidth: 2, 
                            pointBackgroundColor: '#fff',
                            pointBorderColor: '#6366f1',
                            pointRadius: 4,
                            pointHoverRadius: 6
                        }
                    ]
                },
                options: {
                    maintainAspectRatio: false,
                    layout: { padding: 20 },
                    scales: { 
                        r: { 
                            min: 0, 
                            max: 7, 
                            ticks: { display: false, stepSize: 1 }, 
                            grid: { color: '#333' }, 
                            pointLabels: { color: '#aaa', font: { size: 11, weight: 'bold' } },
                            angleLines: { color: '#333' }
                        } 
                    },
                    plugins: { 
                        legend: { display: false },
                        datalabels: {
                            color: '#fff',
                            backgroundColor: 'rgba(67, 56, 202, 0.8)', 
                            borderRadius: 4,
                            font: { weight: 'bold', size: 10 },
                            padding: 4,
                            formatter: (value) => value.toFixed(1), 
                            align: 'start',  
                            anchor: 'end',   
                            offset: 8        
                        }
                    }
                }
            });

            const avg = arr => arr.length ? (arr.reduce((a,b)=>a+b,0)/arr.length).toFixed(1) : "0.0";
            document.getElementById('valP').innerText = avg(pData);

            const fill = (id, arr) => document.getElementById(id).innerHTML = (arr||[]).map(x=>`<li>${x}</li>`).join('');
            fill('listStr', d.feedback?.strengths);
            fill('listImp', d.feedback?.improvements);
            document.getElementById('listRisk').innerHTML = (d.potential_concerns||[]).map(x=>`<li class="mb-2"><b class="text-base text-orange-400 block">${x.title}</b>${x.description}</li>`).join('');
        };
    </script>
</body>
</html>
